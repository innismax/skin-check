<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>innisfree 今日肌膚檢測</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --green:#39C77C; --green-deep:#2FA568; --green-mid:#8FCAA9; --green-pale:#F3F8F4;
      --green-border:#D6E8DB; --bg:#ECF4EE; --white:#FFFEFC;
      --text:#2E4037; --text-mid:#6F7E75; --text-soft:#97A39B;
      --red:#D94F4F;
      --card-shadow:0 24px 60px rgba(58,104,76,.14);
    }
    html,body { min-height:100%; background:var(--bg);
      font-family:-apple-system,'PingFang TC','Helvetica Neue',sans-serif;
      color:var(--text); -webkit-font-smoothing:antialiased; }

    /* ══ SCREENS ══ */
    .screen { display:none; min-height:100vh; }
    .screen.active { display:flex; flex-direction:column; }

    /* ══ GU 頁 ══ */
    #screen-gu {
      align-items:center; justify-content:center;
      background:linear-gradient(180deg, #F9FBF8 0%, #F1F5F0 100%); padding:48px 32px;
    }
    .gu-inner { max-width:440px; width:100%; }
    .gu-title {
      font-size:24px; font-weight:700; color:var(--text);
      margin-bottom:6px;
    }
    .gu-sub {
      font-size:14px; color:var(--red); font-weight:700;
      margin-bottom:36px;
    }
    .gu-block { margin-bottom:24px; }
    .gu-label {
      font-size:12px; color:var(--text-soft); letter-spacing:1px;
      margin-bottom:8px; display:block;
    }
    .gu-static {
      width:100%;
      padding:14px 16px;
      border:1.5px solid var(--green-border);
      border-radius:16px;
      font-size:16px;
      font-weight:700;
      color:var(--green-deep);
      background:rgba(255,255,252,.94);
      box-shadow:0 8px 16px rgba(81,98,85,.04);
    }
    .store-row { display:flex; gap:10px; }
    .store-btn {
      flex:1; padding:12px; border:1.5px solid var(--green-border);
      border-radius:16px; background:rgba(255,255,252,.94); color:var(--text-mid);
      font-size:15px; font-weight:500; font-family:inherit; cursor:pointer;
      transition:all .15s;
    }
    .store-btn.sel {
      background:var(--green-pale); border-color:var(--green);
      color:var(--green); font-weight:700;
    }
    .gu-input {
      width:100%; padding:14px 16px; border:1.5px solid var(--green-border);
      border-radius:16px; font-size:15px; font-family:inherit;
      color:var(--text); background:rgba(255,255,252,.94); outline:none;
    }
    .gu-input:focus { border-color:var(--green); }
    .gu-btn {
      width:100%; padding:17px; background:linear-gradient(135deg, #617769 0%, #2E4037 100%); color:#fff;
      border:none; border-radius:50px; font-size:15px; font-weight:600;
      font-family:inherit; cursor:pointer; margin-top:12px;
      opacity:.4; pointer-events:none; transition:opacity .2s; box-shadow:0 16px 28px rgba(46,64,55,.18);
    }
    .gu-btn.ready { opacity:1; pointer-events:auto; }

    /* ══ WELCOME ══ */
    #screen-welcome {
      align-items:center; justify-content:center;
      background:linear-gradient(180deg, #39C77C 0%, #34BC74 100%);
      padding:32px 24px 44px; gap:0;
    }

    .welcome-card {
      width:min(100%, 430px);
      background:transparent;
      border:none;
      border-radius:40px;
      box-shadow:none;
      padding:10px 6px;
    }
    .hero-wrap {
      display:flex; flex-direction:column; align-items:center;
      gap:0;
      text-align:center;
      color:#fff;
    }
    .hero-brand {
      font-size:54px;
      line-height:1;
      font-weight:800;
      letter-spacing:.5px;
      color:#fff;
      margin-bottom:32px;
    }
    .hero-title {
      font-size:42px;
      line-height:1.18;
      font-weight:700;
      letter-spacing:3px;
      color:#fff;
      margin-bottom:22px;
    }
    .hero-sub {
      font-size:18px;
      line-height:1.9;
      color:rgba(255,255,255,.9);
      margin-bottom:44px;
      font-weight:500;
    }
    .hero-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:min(100%, 320px);
      min-height:68px;
      background:#fff;
      color:var(--green-deep);
      border:none;
      padding:0 28px;
      cursor:pointer;
      border-radius:999px;
      font-size:24px;
      font-weight:700;
      font-family:inherit;
      box-shadow:0 18px 34px rgba(32,92,60,.18);
      position:relative;
      overflow:hidden;
    }
    .hero-arrow {
      margin-left:14px;
      font-size:26px;
      display:inline-block;
      animation:arrowCue 1.15s ease-in-out infinite;
    }
    @keyframes arrowCue {
      0%, 100% { transform:translateX(0); opacity:.58; }
      45% { transform:translateX(8px); opacity:1; }
      70% { transform:translateX(3px); opacity:.82; }
    }

    /* ══ CHAT 背景 ══ */
    #screen-chat {
      background:linear-gradient(180deg, #ECF4EE 0%, #F7FBF8 100%);
      position:relative;
      height:100vh;
      height:100dvh;
      min-height:0;
      overflow:hidden;
    }
    /* 右側大弧線 */
    #screen-chat::before {
      content:'';
      position:fixed; top:6vh; right:-155px;
      width:360px; height:360px; border-radius:50%;
      border:1.5px solid rgba(57,199,124,0.14);
      pointer-events:none; z-index:0;
    }
    /* 右側小弧線 */
    #screen-chat::after {
      content:'';
      position:fixed; top:18vh; right:-115px;
      width:270px; height:270px; border-radius:50%;
      border:1px solid rgba(57,199,124,0.09);
      pointer-events:none; z-index:0;
    }

    /* ══ CHAT AREA ══ */
    .chat-body {
      flex:1; min-height:0; padding:22px 18px 28px;
      max-width:680px; width:100%; margin:0 auto;
      position:relative; z-index:1;
      overflow-y:auto; overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }
    .ai-panel {
      width:min(100%, 560px);
      margin:0 auto;
      background:rgba(255,255,255,.86);
      border:1px solid rgba(255,255,255,.92);
      border-radius:34px;
      box-shadow:var(--card-shadow);
      padding:28px 18px 22px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      opacity:0;
      transform:translateY(8px);
      animation:fadeUp .28s ease forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    .ai-head {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
      margin-bottom:18px;
    }
    .panel-brand {
      font-size:18px;
      line-height:1;
      font-weight:800;
      letter-spacing:.4px;
      color:var(--green);
    }
    .question-card {
      background:var(--green);
      border-radius:28px;
      box-shadow:0 14px 26px rgba(57,199,124,.14);
      padding:24px 22px;
      margin-bottom:14px;
    }
    .question-card.main-question {
      padding:28px 24px;
    }
    .question-card.large-question {
      padding:28px 24px;
    }
    .step-back {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      margin-bottom:14px;
      border:none;
      border-radius:999px;
      background:rgba(235,241,234,.82);
      color:#50685A;
      font-size:14px;
      font-weight:700;
      font-family:inherit;
      cursor:pointer;
    }
    .step-back:active { transform:scale(.98); }
    .q-main {
      font-size:19px;
      line-height:1.65;
      color:#fff;
      font-weight:600;
    }
    .question-card.main-question .q-main {
      font-size:22px;
      line-height:1.55;
      font-weight:700;
    }
    .question-card.large-question .q-main {
      font-size:22px;
      line-height:1.55;
      font-weight:700;
    }
    .q-main .q-note {
      display:block;
      margin-top:12px;
      font-size:17px;
      color:#FF6B6B;
      font-weight:700;
      letter-spacing:.2px;
      text-shadow:none;
    }
    .q-hint {
      margin:2px 6px 14px;
      font-size:14px;
      color:var(--red);
      font-weight:700;
    }
    .opts-wrap {
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:6px;
    }
    .opt-btn {
      width:100%;
      min-height:74px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(255,253,249,.95);
      border:1.5px solid var(--green-border);
      color:var(--green);
      font-size:18px;
      font-weight:600;
      padding:0 22px;
      border-radius:999px;
      cursor:pointer;
      font-family:inherit;
      transition:all .15s;
      box-shadow:0 8px 16px rgba(81,98,85,.05);
      text-align:left;
    }
    .opt-btn::after {
      content:'';
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(110,133,115,.28);
      flex-shrink:0;
    }
    .opt-btn.sel {
      background:linear-gradient(135deg, #39C77C 0%, #2FA568 100%);
      color:#fff;
      border-color:#2FA568;
      box-shadow:0 12px 22px rgba(47,165,104,.18);
    }
    .opt-btn.sel::after {
      border-color:rgba(255,255,255,.92);
      background:radial-gradient(circle at center, rgba(255,255,255,.92) 0 38%, transparent 41%);
    }
    .opt-btn:active { transform:scale(.985); }
    .image-grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
      margin-top:8px;
    }
    .image-opt {
      grid-column:span 1;
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      font-family:inherit;
      text-align:left;
    }
    .image-opt-card {
      position:relative;
      border-radius:28px;
      background:rgba(255,255,255,.97);
      border:2px solid rgba(185, 220, 196, .92);
      box-shadow:0 14px 30px rgba(81,98,85,.08);
      overflow:hidden;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .image-opt.sel .image-opt-card {
      border-color:#1F9B5E;
      box-shadow:0 0 0 4px rgba(57,199,124,.16), 0 18px 34px rgba(47,165,104,.24);
      transform:translateY(-2px);
    }
    .image-opt.sel .image-opt-card::after {
      content:'已選擇';
      position:absolute;
      top:12px;
      right:12px;
      z-index:2;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(34,143,88,.96);
      color:#fff;
      font-size:12px;
      font-weight:800;
      letter-spacing:.4px;
      box-shadow:0 8px 16px rgba(34,143,88,.22);
    }
    .image-opt:active .image-opt-card { transform:scale(.985); }
    .image-opt-media {
      aspect-ratio:1 / 1.12;
      background:linear-gradient(180deg, #F8FCF8 0%, #EEF6F0 100%);
      border-bottom:1px solid rgba(214,232,219,.75);
      overflow:hidden;
      padding:0;
    }
    .image-opt-media img {
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center top;
      border-radius:0;
    }
    .image-opt-body {
      padding:10px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:58px;
      background:linear-gradient(135deg, #39C77C 0%, #2FA568 100%);
    }
    .image-opt-label {
      color:#fff;
      font-size:16px;
      line-height:1.32;
      font-weight:700;
      min-width:0;
      flex:1;
      word-break:keep-all;
    }
    .image-grid.main-grid .image-opt-label {
      font-size:20px;
      line-height:1.28;
      font-weight:800;
    }
    .image-grid.eye-grid .image-opt-card {
      border-radius:26px;
    }
    .image-grid.eye-grid .image-opt-media {
      aspect-ratio:1.08 / 1;
    }
    .image-grid.eye-grid .image-opt-body {
      min-height:96px;
      align-items:flex-start;
      padding:14px 14px 16px;
    }
    .image-grid.eye-grid .image-opt-copy {
      min-width:0;
      flex:1;
    }
    .image-grid.eye-grid .image-opt-label {
      font-size:22px;
      line-height:1.2;
      font-weight:800;
      margin-bottom:6px;
    }
    .image-grid.eye-grid .image-opt-note {
      display:block;
      color:rgba(255,255,255,.88);
      font-size:16px;
      line-height:1.42;
      font-weight:700;
    }
    .image-grid.lifestyle-grid .image-opt-card {
      border-radius:26px;
    }
    .image-grid.lifestyle-grid .image-opt-media {
      aspect-ratio:1.08 / 1;
    }
    .image-grid.lifestyle-grid .image-opt-body {
      min-height:96px;
      align-items:flex-start;
      padding:14px 14px 16px;
    }
    .image-grid.lifestyle-grid .image-opt-copy {
      min-width:0;
      flex:1;
    }
    .image-grid.lifestyle-grid .image-opt-label {
      font-size:22px;
      line-height:1.2;
      font-weight:800;
      margin-bottom:6px;
    }
    .image-grid.lifestyle-grid .image-opt-note {
      display:block;
      color:rgba(255,255,255,.88);
      font-size:15px;
      line-height:1.4;
      font-weight:700;
    }
    .image-opt-media-placeholder {
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, #EAF8EF 0%, #D5F1DE 100%);
      color:#228F58;
      font-size:18px;
      font-weight:800;
      letter-spacing:.4px;
    }
    .image-opt-check {
      width:24px;
      height:24px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.82);
      flex-shrink:0;
      position:relative;
      background:transparent;
    }
    .image-opt.sel .image-opt-check {
      border-color:#fff;
      background:#fff;
    }
    .image-opt.sel .image-opt-check::after {
      content:'';
      position:absolute;
      inset:5px;
      border-radius:50%;
      background:#228F58;
    }
    .step-next {
      width:100%;
      min-height:58px;
      margin-top:16px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg, #39C77C 0%, #2FA568 100%);
      color:#fff;
      font-size:18px;
      font-weight:700;
      font-family:inherit;
      cursor:pointer;
      box-shadow:0 14px 24px rgba(47,165,104,.18);
      transition:opacity .15s ease, transform .15s ease;
    }
    .step-next:active { transform:scale(.985); }
    .step-next:disabled {
      opacity:.38;
      cursor:default;
      box-shadow:none;
    }
    .progress-card {
      margin-top:18px;
      background:rgba(255,253,249,.98);
      border-radius:24px;
      box-shadow:0 12px 22px rgba(89,105,92,.06);
      padding:16px 18px 18px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .progress-track {
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      align-items:center;
      gap:8px;
    }
    .progress-dot {
      height:16px;
      border-radius:999px;
      background:rgba(209,219,209,.9);
      position:relative;
      overflow:hidden;
    }
    .progress-dot.active { background:linear-gradient(135deg, #39C77C 0%, #2FA568 100%); }
    .progress-dot.done { background:rgba(122,212,163,.84); }
    .progress-text {
      text-align:center;
      color:var(--text-mid);
      font-size:14px;
      letter-spacing:1px;
    }

    /* ══ RESULT CARD ══ */
    .res-card {
      background:rgba(255,253,249,.96); border-radius:28px; padding:24px 20px;
      margin:0 auto;
      width:min(100%, 560px);
      box-shadow:0 22px 44px rgba(87,103,90,.12);
      border:1.5px solid var(--green-border);
      opacity:0; animation:fadeUp .4s ease forwards;
    }
    .res-headline {
      font-size:10px; letter-spacing:3px; color:var(--green);
      text-transform:uppercase; font-weight:700; margin-bottom:18px;
    }
    .choices-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
    .cg-row { display:grid; grid-template-columns:72px 1fr; gap:8px; }
    .cg-label { font-size:12px; color:var(--text-soft); padding-top:1px; }
    .cg-val { font-size:14px; color:var(--text); font-weight:500; line-height:1.6; }
    .steps-divider { height:1px; background:var(--green-border); margin-bottom:18px; }
    .steps-title {
      font-size:22px;
      letter-spacing:.5px;
      color:var(--green);
      font-weight:800;
      margin-bottom:18px;
      text-align:center;
    }
    .recommend-card {
      display:grid;
      grid-template-columns:112px 1fr;
      gap:16px;
      align-items:center;
      padding:16px 18px; margin-bottom:12px;
      border:1px solid var(--green-border); border-radius:22px;
      background:linear-gradient(180deg, #FBFDF9 0%, #F0F6F0 100%);
      box-shadow:0 10px 24px rgba(103,126,108,.08);
    }
    .recommend-card:last-child { margin-bottom:0; }
    .recommend-media {
      height:112px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(242,248,241,.95) 0%, rgba(232,240,232,.95) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border:1px solid rgba(122,163,132,.14);
    }
    .recommend-media img {
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }
    .recommend-media img.white-edge-soften {
      mix-blend-mode:multiply;
    }
    .recommend-placeholder {
      padding:12px;
      text-align:center;
      color:rgba(73,111,84,.72);
      font-size:12px;
      line-height:1.45;
      font-weight:700;
      letter-spacing:.6px;
    }
    .recommend-copy {
      min-width:0;
    }
    .recommend-action {
      font-size:21px;
      color:var(--text);
      font-weight:700;
      line-height:1.42;
      margin-bottom:10px;
    }
    .recommend-product {
      font-size:15px;
      color:var(--green);
      font-weight:700;
      line-height:1.5;
    }
    .recommend-product-label {
      display:block;
      color:var(--text-soft);
      font-size:11px;
      letter-spacing:1.2px;
      margin-bottom:4px;
    }
    .advice-block { padding:15px 0 2px; color:var(--text-mid); font-size:14px; line-height:1.7; }
    .advice-part + .advice-part { margin-top:18px; }
    .advice-label { color:var(--text); font-weight:700; margin-bottom:4px; }

    /* ══ RESTART ══ */
    .restart-btn {
      display:block; margin:16px auto 0;
      padding:12px 32px; background:transparent;
      border:1.5px solid var(--green-border); border-radius:50px;
      color:var(--green); font-size:14px; font-family:inherit; cursor:pointer;
      opacity:0; animation:fadeUp .3s ease .2s forwards;
    }
    @media (max-width: 480px) {
      .chat-body { padding:18px 12px 22px; }
      .ai-panel { border-radius:28px; padding:22px 14px 18px; }
      .question-card { padding:22px 18px; border-radius:24px; }
      .q-main { font-size:18px; }
      .question-card.main-question { padding:24px 18px; }
      .question-card.large-question { padding:24px 18px; }
      .question-card.main-question .q-main { font-size:20px; }
      .question-card.large-question .q-main { font-size:20px; }
      .opt-btn { min-height:66px; font-size:17px; padding:0 18px; }
      .image-grid { gap:12px; }
      .image-opt-card { border-radius:24px; }
      .image-opt-media { padding:0; }
      .image-opt-media img { border-radius:0; }
      .image-opt-label { font-size:15px; }
      .image-grid.main-grid .image-opt-label { font-size:18px; }
      .image-grid.eye-grid .image-opt-label { font-size:19px; }
      .image-grid.eye-grid .image-opt-note { font-size:14px; }
      .image-grid.eye-grid .image-opt-body { min-height:98px; padding:12px; }
      .image-grid.lifestyle-grid .image-opt-label { font-size:19px; }
      .image-grid.lifestyle-grid .image-opt-note { font-size:13px; }
      .image-grid.lifestyle-grid .image-opt-body { min-height:98px; padding:12px; }
      .image-opt-body { min-height:56px; padding:10px 11px; }
      .image-opt-check { width:18px; height:18px; }
      .hero-brand { font-size:44px; margin-bottom:24px; }
      .hero-title { font-size:34px; margin-bottom:18px; }
      .hero-sub { font-size:16px; margin-bottom:34px; }
      .hero-btn { min-height:62px; font-size:22px; }
      .recommend-card {
        grid-template-columns:90px 1fr;
        gap:12px;
        padding:14px;
      }
      .recommend-media { height:90px; border-radius:16px; }
      .steps-title { font-size:20px; }
      .recommend-action { font-size:18px; }
      .recommend-product { font-size:14px; }
    }
  </style>
</head>
<body>

<!-- ══ GU 頁 ══ -->
<div id="screen-gu" class="screen active">
  <div class="gu-inner">
    <div class="gu-title">開始測試前</div>

    <div class="gu-block">

      <div class="gu-static" id="gu-store-display" style="display:none;"></div>

      <input class="gu-input" id="gu-name" type="text" placeholder="請輸入你的名字" oninput="checkGU()">

    <div class="gu-block">
      <span class="gu-label">日期</span>
      <input class="gu-input" id="gu-date" type="date">

    <button class="gu-btn" id="gu-next" onclick="guData.date=document.getElementById('gu-date').value; goTo('screen-welcome')">確認，帶客人開始 →</button>

</div>

  function goTo(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

    window.scrollTo(0,0);
    if(id === 'screen-chat') chat.scrollTop = 0;

  function getStepOptions(q) {
    return q.key === 's1'
      ? q.opts.filter(function(opt){ return opt !== answers.main; })
      : q.opts;
  }

  function formatQuestionText(raw) {
    const parts = raw.split('\n');
    if (parts.length === 1) return '<div class="q-main">' + parts[0] + '</div>';
    return '<div class="q-main">' + parts[0] + '<span class="q-note">' + parts.slice(1).join('<br>') + '</span></div>';
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderOptions(q, optionList, selected) {
    if (q.key === 'main') {
      var grid = '<div class="image-grid main-grid">';
      optionList.forEach(function(opt){
        var isSelected = selected.indexOf(opt) > -1 ? ' sel' : '';
        var img = mainConcernImages[opt] || '';
        grid += '<button class="image-opt' + isSelected + '" data-value="' + escapeHtml(opt) + '">' +
          '<div class="image-opt-card">' +
            '<div class="image-opt-media"><img src="' + img + '" alt="' + escapeHtml(opt) + '"></div>' +
            '<div class="image-opt-body">' +
              '<div class="image-opt-label">' + opt + '</div>' +
              '<div class="image-opt-check"></div>' +
            '</div>' +
          '</div>' +
        '</button>';
      });
      grid += '</div>';
      return grid;
    }

    if (q.key === 's2') {
      var eyeGrid = '<div class="image-grid eye-grid">';
      optionList.forEach(function(opt){
        var isSelected = selected.indexOf(opt) > -1 ? ' sel' : '';

  function renderProgress(current) {
    var dots = '';
    for (var i = 0; i < questions.length; i++) {
      var cls = 'progress-dot';
      if (i < current) cls += ' done';
      if (i === current) cls += ' active';
      dots += '<div class="' + cls + '"></div>';
    }
    return '<div class="progress-card">' +
      '<div class="progress-track">' + dots + '</div>' +
      '<div class="progress-text">第 ' + (current + 1) + ' 題，共 ' + questions.length + ' 題</div>' +
    '</div>';
  }

      showResult();
      return;
    }
    const q = questions[step];
    const optionList = getStepOptions(q);
    const selected = Array.isArray(answers[q.key]) ? answers[q.key] : (answers[q.key] ? [answers[q.key]] : []);

    var html = '<div class="ai-panel">' +
      '<div class="ai-head">' +
        '<div class="panel-brand">INNISFREE</div>' +
      '</div>';

    if (step > 0) {
      html += '<button class="step-back" type="button" data-back-step="1">← 上一題</button>';
    }

    var questionClass = 'question-card';
    if (q.key === 'main') questionClass += ' main-question';
    if (q.key === 's1' || q.key === 's2') questionClass += ' large-question';
    html += '<div class="' + questionClass + '">' + formatQuestionText(q.q) + '</div>';

    if (q.hint) html += '<div class="q-hint">' + q.hint + '</div>';

    var hasSelection = selected.length > 0;
    html += renderOptions(q, optionList, selected);
    html += renderProgress(step);
    html += '<button class="step-next" type="button"' + (hasSelection ? '' : ' disabled') + '>下一題 →</button>';
    html += '</div>';

    chat.innerHTML = html;
    bindBackEvent();
    bindOptionEvents(q);
    bindNextEvent(q);
    chat.scrollTop = 0;
  }

  function clearAnswersAfter(stepIndex) {
    for (var i = stepIndex + 1; i < questions.length; i++) {
      delete answers[questions[i].key];
    }
  }

  function bindBackEvent() {
    const backBtn = chat.querySelector('.step-back');
    if (!backBtn) return;
    backBtn.addEventListener('click', function(){
      if (step <= 0) return;
      step -= 1;
      clearAnswersAfter(step);
      renderCurrentStep();
    });
  }

  function bindOptionEvents(q) {
    const btns = chat.querySelectorAll('.opt-btn, .image-opt');
    btns.forEach(function(btn){
      btn.addEventListener('click', function(){
        const value = btn.getAttribute('data-value');
        if (q.multi <= 1) {
          answers[q.key] = value;
          clearAnswersAfter(step);
          renderCurrentStep();
          return;
        }

        var current = Array.isArray(answers[q.key]) ? answers[q.key].slice() : [];
        if (current.indexOf(value) > -1) {
          current = current.filter(function(item){ return item !== value; });
        } else {
          if (current.length >= q.multi) return;
          current.push(value);
        }
        answers[q.key] = current;
        renderCurrentStep();
      });
    });
  }

  function bindNextEvent(q) {
    const nextBtn = chat.querySelector('.step-next');
    if (!nextBtn) return;
    nextBtn.addEventListener('click', function(){
      const currentValue = answers[q.key];
      const selected = Array.isArray(currentValue) ? currentValue : (currentValue ? [currentValue] : []);
      if (!selected.length) return;
      clearAnswersAfter(step);
      step++;
      renderCurrentStep();
    });
  }

  function makeProductMedia(product) {
    var asset = productAssets[product];
    var extraClass = productImageClasses[product] ? (' ' + productImageClasses[product]) : '';
    if (asset) {
      return '<div class="recommend-media"><img class="' + extraClass.trim() + '" src="' + asset + '" alt="' + product + '"></div>';
    }
    return '<div class="recommend-media"><div class="recommend-placeholder">PRODUCT IMAGE<br>COMING SOON</div></div>';
  }

  function makeRecommendationCard(action, product) {
    return '<div class="recommend-card">' +
      makeProductMedia(product) +
      '<div class="recommend-copy">' +
        '<div class="recommend-action">' + action + '</div>' +
        '<div class="recommend-product"><span class="recommend-product-label">推薦商品</span>' + product + '</div>' +
      '</div>' +
    '</div>';
  }

  function getSecondaryRecommendations(concerns) {
    var grouped = {};
    concerns.forEach(function(concern){
      var recommendation = step02Data[concern];
      if (!recommendation) return;
      if (!grouped[recommendation.product]) {
        grouped[recommendation.product] = { product:recommendation.product, actions:[recommendation.action] };
      } else if (grouped[recommendation.product].actions.indexOf(recommendation.action) === -1) {
        grouped[recommendation.product].actions.push(recommendation.action);
      }
    });
    return Object.keys(grouped).map(function(product){
      var item = grouped[product];
      var action = item.actions.length > 1 ? (mergedStep02Actions[product] || item.actions.join('；')) : item.actions[0];
      return { action:action, product:product };
    });
  }

  function mergeRecommendations(list) {
    var grouped = {};
    list.forEach(function(item){
      if (!item || !item.product) return;
      if (!grouped[item.product]) {
        grouped[item.product] = { product:item.product, actions:[] };
      }
      if (item.action && grouped[item.product].actions.indexOf(item.action) === -1) {
        grouped[item.product].actions.push(item.action);
      }
    });
    return Object.keys(grouped).map(function(product){
      var item = grouped[product];
      return {
        product:product,
        action:item.actions.length > 1 ? item.actions.join('；') : item.actions[0]
      };
    });
  }

  function showResult(){
    chat.innerHTML = '';
    const mainConcern = answers.main || '';
    const s1arr       = Array.isArray(answers.s1) ? answers.s1 : (answers.s1 ? [answers.s1] : []);
    const s2val       = answers.s2 || '';
    const lifestyleArr = Array.isArray(answers.lifestyle) ? answers.lifestyle : (answers.lifestyle ? [answers.lifestyle] : []);
    const stype       = answers.skin_type || '—';

    // ── 顧問邏輯：調理保養 → 核心精華(最多2支) → 眼周 → 面霜 ──
    var recommendations = [];
    var s01 = step01Data[mainConcern];
    if (s01) {
      recommendations.push(s01);
    }

    recommendations = recommendations.concat(getSecondaryRecommendations(s1arr));
    var eyeCare = eyeCareMap[s2val];
    if (eyeCare) recommendations.push(eyeCare);
    var creamCare = creamCareMap[mainConcern];
    if (creamCare) recommendations.push(creamCare);
    var mergedRecommendations = mergeRecommendations(recommendations);
    var recommendedProducts = mergedRecommendations.map(function(item){ return item.product; });
    var recommendationsHtml = mergedRecommendations.map(function(item){
      return makeRecommendationCard(item.action, item.product);
    }).join('');

    logToSheet(mainConcern, s1arr, s2val, lifestyleArr, recommendedProducts);

    // 「你的選擇」顯示：主困擾 + 次要困擾
    var concernVal = '✓ ' + mainConcern;
    if (s1arr.length > 0) { concernVal += '<br>' + s1arr.map(function(v){ return '✓ ' + v; }).join('<br>'); }

    const backBtn = document.createElement('button');
    backBtn.className = 'step-back';
    backBtn.type = 'button';
    backBtn.textContent = '← 上一題';
    backBtn.onclick = function(){
      step = questions.length - 1;
      renderCurrentStep();
    };
    chat.appendChild(backBtn);

    const card = document.createElement('div');
    card.className = 'res-card';
    card.innerHTML =
      '<div class="res-headline">今日肌膚關鍵字</div>' +
      '<div class="choices-grid">' +
        '<div class="cg-row"><div class="cg-label">膚質</div><div class="cg-val">' + stype + '</div></div>' +
        '<div class="cg-row"><div class="cg-label">肌膚困擾</div><div class="cg-val">' + concernVal + '</div></div>' +
        '<div class="cg-row"><div class="cg-label">眼周狀態</div><div class="cg-val">' + (s2val ? ('✓ ' + s2val) : '—') + '</div></div>' +
        '<div class="cg-row"><div class="cg-label">生活情境</div><div class="cg-val">' + (lifestyleArr.length ? lifestyleArr.map(function(v){ return '✓ ' + v; }).join('<br>') : '—') + '</div></div>' +
      '</div>' +
      '<div class="steps-divider"></div>' +
      '<div class="steps-title">今日推薦保養</div>' +
      recommendationsHtml;

    chat.appendChild(card);

    const btn = document.createElement('button');
    btn.className = 'restart-btn'; btn.textContent = '再測一次';
    btn.onclick = function(){
      chat.innerHTML = ''; step = 0; answers = {}; selectedOpts = [];
      document.getElementById('gu-name').value = '';
      document.querySelectorAll('.store-btn').forEach(function(b){ b.classList.remove('sel'); });
      guData.name = '';
      if (STORE_CONFIG.locked) {
        guData.region = STORE_CONFIG.region;
        guData.store = STORE_CONFIG.store;
      } else {
        guData.region = '';
        guData.store = '';
      }
      document.getElementById('gu-next').classList.remove('ready');
      document.getElementById('gu-date').value = new Date().toISOString().split('T')[0];
      goTo('screen-gu');
    };
    chat.appendChild(btn);
    chat.scrollTop = 0;
  }
</script>
